<!DOCTYPE html>
<html lang="en-US">

<head>
	<link rel="stylesheet" href="styles-mobile.css">
	<meta charset="utf-8"> <!-- define encoding early -->
	<meta name="viewport" content="width=device-width,initial-scale=1"> <!-- responsive -->
	<title>Mobile QrCode Component| Frontend Mentor Project</title> <!-- concise, descriptive title -->
</head>

<body>
	<main>
		<section class="mobile">

			<div class="card">
				<img class="qr-image" src="images/image-qr-code.png" alt="QR code linking to Frontend Mentor homepage">
				<h1 class="title">
					Improve your front-end skills by building projects
				</h1>

				<p class="description">
					Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
				</p>

			</div>
		</section>
	</main>
</body>

</html>
